"$schema" = 'https://starship.rs/config-schema.json'
palette = "rose-pine"

format = """
[░▒▓](#ebbcba)\
[ 󱄅 ](bg:#ebbcba fg:#191724)\
[](bg:#31748f fg:#ebbcba)\
$directory\
[](fg:#31748f bg:#26233a)\
$git_branch\
$git_status\
[](fg:#26233a bg:#1f1d2e)\
$nodejs\
$bun\
$rust\
$golang\
$php\
[](fg:#1f1d2e bg:#21202e)\
$time\
[ ](fg:#21202e)\
\n$character"""

[directory]
style = "fg:#e0def4 bg:#31748f"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "bg:#26233a"
format = '[[ $symbol $branch ](fg:#f6c177 bg:#26233a)]($style)'

[git_status]
style = "bg:#26233a"
format = '[[($all_status$ahead_behind )](fg:#f6c177 bg:#26233a)]($style)'

[nodejs]
symbol = ""
style = "bg:#1f1d2e"
format = '[[ $symbol ($version) ](fg:#c4a7e7 bg:#1f1d2e)]($style)'

[bun]
symbol = "🥟"
style = "bg:#1f1d2e"
format = '[[ $symbol ($version) ](fg:#c4a7e7 bg:#1f1d2e)]($style)'

[rust]
symbol = ""
style = "bg:#1f1d2e"
format = '[[ $symbol ($version) ](fg:#c4a7e7 bg:#1f1d2e)]($style)'

[golang]
symbol = ""
style = "bg:#1f1d2e"
format = '[[ $symbol ($version) ](fg:#c4a7e7 bg:#1f1d2e)]($style)'

[php]
symbol = ""
style = "bg:#1f1d2e"
format = '[[ $symbol ($version) ](fg:#c4a7e7 bg:#1f1d2e)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#21202e"
format = '[[  $time ](fg:#908caa bg:#21202e)]($style)'

[palettes.rose-pine]
# Standard colors
blue      = "#9ccfd8"
red       = "#eb6f92"
green     = "#31748f"
yellow    = "#f6c177"
cyan      = "#ebbcba"
magenta   = "#c4a7e7"
white     = "#e0def4"
black     = "#26233a"

# Extended palette (Catppuccin-compatible names)
rosewater = "#f6c177"
flamingo  = "#eb6f92"
pink      = "#c4a7e7"
mauve     = "#c4a7e7"
maroon    = "#eb6f92"
peach     = "#f6c177"
teal      = "#ebbcba"
sky       = "#ebbcba"
sapphire  = "#9ccfd8"
lavender  = "#c4a7e7"

# Text shades
text      = "#e0def4"
subtext1  = "#e0def4"
subtext0  = "#6e6a86"

# Surface shades
overlay2  = "#6e6a86"
overlay1  = "#6e6a86"
overlay0  = "#26233a"
surface2  = "#26233a"
surface1  = "#26233a"
surface0  = "#191724"
base      = "#191724"
mantle    = "#191724"
crust     = "#191724"
