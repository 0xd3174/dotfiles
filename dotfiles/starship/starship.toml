"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в–‘в–’в–“](#ebbcba)\
[ уұ„… ](bg:#ebbcba fg:#191724)\
[оӮҙ](bg:#31748f fg:#ebbcba)\
$directory\
[оӮҙ](fg:#31748f bg:#26233a)\
$git_branch\
$git_status\
[оӮҙ](fg:#26233a bg:#1f1d2e)\
$nodejs\
$bun\
$rust\
$golang\
$php\
[оӮҙ](fg:#1f1d2e bg:#21202e)\
$time\
[оӮҙ ](fg:#21202e)\
\n$character"""

[directory]
style = "fg:#e0def4 bg:#31748f"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#26233a"
format = '[[ $symbol $branch ](fg:#f6c177 bg:#26233a)]($style)'

[git_status]
style = "bg:#26233a"
format = '[[($all_status$ahead_behind )](fg:#f6c177 bg:#26233a)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#1f1d2e"
format = '[[ $symbol ($version) ](fg:#c4a7e7 bg:#1f1d2e)]($style)'

[bun]
symbol = "рҹҘҹ"
style = "bg:#1f1d2e"
format = '[[ $symbol ($version) ](fg:#c4a7e7 bg:#1f1d2e)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#1f1d2e"
format = '[[ $symbol ($version) ](fg:#c4a7e7 bg:#1f1d2e)]($style)'

[golang]
symbol = "оҳ§"
style = "bg:#1f1d2e"
format = '[[ $symbol ($version) ](fg:#c4a7e7 bg:#1f1d2e)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#1f1d2e"
format = '[[ $symbol ($version) ](fg:#c4a7e7 bg:#1f1d2e)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#21202e"
format = '[[ пҗә $time ](fg:#908caa bg:#21202e)]($style)'
